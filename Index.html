<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <title>Desert Sandbox VR</title>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: egypt; dressingAmount: 10"></a-entity>

      <a-box position="0 0.5 -1.5" width="2" height="1" depth="1" color="#5D2906"></a-box>
      
      <a-box position="0 1.1 -1.5" width="0.3" height="0.1" depth="0.5" color="red"></a-box>

      <a-entity id="rig">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity hand-controls="hand: left; handModelStyle: lowPoly; color: #111"></a-entity>
        <a-entity hand-controls="hand: right; handModelStyle: lowPoly; color: #111"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
